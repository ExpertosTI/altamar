upstream odoo-backend {
    server 85.31.224.232:9010;
}
upstream odoo-chat {
    server 85.31.224.232:8072;
}

server {
    listen 80;
    server_name localhost;

    # Aumentar límites para subida de archivos pesados
    client_max_body_size 128M;

    # Parámetros de buffer para evitar errores de cabeceras largas
    proxy_read_timeout 720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout 720s;
    proxy_buffers 16 64k;
    proxy_buffer_size 128k;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hide Nginx version
    server_tokens off;

    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log;

    # Bloquear acceso a archivos ocultos (ej. .git, .env)
    location ~ /\. {
        deny all;
    }

    # Redirección de Longpolling (Chat Odoo)
    location /longpolling {
        proxy_pass http://odoo-chat;
    }

    # Landing Page (Archivos Estáticos)
    location = / {
        root   /usr/share/nginx/html;
        index  index.html;
    }

    # Assets de la Landing Page
    location /assets/ {
        root   /usr/share/nginx/html;
    }

    # Panel de administración de analíticas (GoAccess)
    location /admin/ {
        alias /var/www/admin/;
        index index.html;
    }

    # Resto de la aplicación Odoo (/web, /shop, etc.)
    location / {
        proxy_redirect off;
        proxy_pass http://odoo-backend;
        
        # Cabeceras estándar para Odoo Proxy Mode
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Caché para archivos estáticos de Odoo
    location ~* /web/static/ {
        proxy_cache_valid 200 90m;
        proxy_buffering on;
        expires 864000;
        proxy_pass http://odoo-backend;
    }

    # Compresión Gzip
    gzip_types text/css text/less text/plain text/xml application/xml application/json application/javascript;
    gzip on;
}
