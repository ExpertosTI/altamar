server {
    listen 80;
    server_name localhost;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval'; frame-ancestors 'self';" always;

    # Hide Nginx version
    server_tokens off;

    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log;

    # Bloquear acceso a archivos ocultos (ej. .git, .env)
    location ~ /\. {
        deny all;
    }

    # Página principal
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
    }

    # Panel de administración de analíticas (GoAccess)
    location /admin/ {
        alias /var/www/admin/;
        index index.html;
        
        # Opcional: Agregar seguridad básica (Basic Auth) si lo deseas en el futuro
        # auth_basic "Área Restringida";
        # auth_basic_user_file /etc/nginx/.htpasswd;
    }
}
