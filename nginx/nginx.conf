limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

server {
    listen 80;
    server_name localhost;

    # Aumentar límites para subida de archivos pesados
    client_max_body_size 128M;

    # Parámetros de buffer para evitar errores de cabeceras largas
    proxy_read_timeout 720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout 720s;
    proxy_buffers 16 64k;
    proxy_buffer_size 128k;

    # Rate Limiting & Timeouts (Security Hardening)
    client_body_timeout 12s;
    client_header_timeout 12s;
    keepalive_timeout 15s;
    send_timeout 10s;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self' https: data: blob: 'unsafe-inline' 'unsafe-eval'; img-src 'self' https: data: blob:; font-src 'self' https: data:;" always;

    # Hide Nginx version
    server_tokens off;

    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log;

    # Bloquear acceso a archivos ocultos (ej. .git, .env)
    location ~ /\. {
        deny all;
    }

    # Landing Page (Archivos Estáticos)
    location / {
        limit_req zone=login_limit burst=10 nodelay;
        root   /usr/share/nginx/html;
        index  index.html;

        # FORZAR ACTUALIZACIÓN DE CACHÉ EN LOS NAVEGADORES
        # Esto le dice a Chrome/Safari/Edge que NUNCA guarden la estructura base de la página
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;

        try_files $uri $uri/ =404;
    }

    # Para recursos pesados (imágenes, videos, fuentes) permitimos caché, 
    # pero los invalidaremos desde el HTML usando "versionamiento" (ej. style.css?v=2)
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mp4|webm)$ {
        root   /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    # Panel de administración de analíticas (GoAccess)
    location /admin/ {
        alias /var/www/admin/;
        index index.html;
    }

    # Compresión Gzip
    gzip_types text/css text/less text/plain text/xml application/xml application/json application/javascript;
    gzip on;
}
